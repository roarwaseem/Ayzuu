<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYZA Final Relationship Exam 💍</title>
    <style>
        :root {
            --primary: #ff3366;
            --secondary: #4facfe;
            --bg-grad: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-grad);
            margin: 0;
            padding: 10px;
            color: #2d3436;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            padding: 20px;
            border-radius: 25px;
            max-width: 500px;
            margin: 10px auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--primary);
            text-align: center;
            font-size: 2rem;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #636e72;
            margin-bottom: 30px;
        }

        h2 {
            font-size: 1.2rem;
            color: #2d3436;
            border-left: 5px solid var(--primary);
            padding-left: 10px;
            margin: 25px 0 15px 0;
        }

        .question-card {
            background: #fff;
            border: 1px solid #edf2f7;
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .q-text {
            font-weight: 700;
            margin-bottom: 15px;
            display: block;
            line-height: 1.4;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 2px solid #f1f2f6;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input[type="radio"] {
            display: none; /* Hide default radio */
        }

        /* Custom selection style */
        .option-label:has(input:checked) {
            background: #fff0f3;
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .option-label:active { transform: scale(0.96); }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            margin-top: 30px;
            padding: 18px;
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(255, 51, 102, 0.2);
        }

        #result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 20px;
            border: 2px solid var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💖 AYZA Exam 💖</h1>
    <p class="subtitle">Soch samajh kar sahi option choose karna! 😉</p>

    <div id="mcqs-container"></div>

    <h2>Section B - Dil Ki Baat</h2>
    <div id="long-questions-container"></div>

    <button onclick="submitExam()">Submit My Love Letter 💌</button>

    <div id="result"></div>
</div>

<script>
// Specialized Options for each question
const examData = [
    { q: "Shaadi ke baad tum:", opts: ["Best friend ban kar rahogi", "Nakhre dikhaogi", "Dono 50-50"] },
    { q: "Khana kaun banayega?", opts: ["Main banaungi", "Tum banaoge", "Mil kar banayenge 🍳"] },
    { q: "Free time me kya karenge?", opts: ["Netflix & Chill 🍿", "Lambe safar par jayenge", "Bas baatein karenge"] },
    { q: "Agar ladai ho jaye to?", opts: ["Main pehle sorry bolungi", "Tumhe manana padega!", "Ice-cream kha kar solve karenge"] },
    { q: "Weekend plan kya hoga?", opts: ["Ghar par rest", "Shopping aur Outing", "Family ke sath dinner"] },
    { q: "Travel pasand hai?", opts: ["Mountains 🏔️", "Beaches 🌊", "Ghar hi thik hai"] },
    { q: "Mujhe ignore karogi?", opts: ["Kabhi nahi!", "Jab gussa hungi tab", "Thoda sa tang karne ke liye"] },
    { q: "Mujhe kitna pyar karti ho?", opts: ["Dunya se zyada", "Tumhari soch se zyada", "Bata nahi sakti ❤️"] },
    { q: "Meri sabse achi cheez kya hai?", opts: ["Tumhara nature", "Tumhari looks", "Jis tarah tum care karte ho"] },
    { q: "Gift kya pasand hai?", opts: ["Surprises 🎁", "Chocolate & Flowers", "Bas tumhara time"] },
    { q: "Movie ya Adventure?", opts: ["Romantic Movie 🎬", "Hiking/Tracking", "Dono ka mix"] },
    { q: "Late reply kyun aata hai?", opts: ["Busy hoti hoon", "Jan boojh kar tadpane ke liye", "Internet issue hota hai"] },
    { q: "Call ya Text?", opts: ["Lambi Calls 📞", "Sweet Texts", "Video Call hamesha"] },
    { q: "Jealous hoti ho?", opts: ["Haq hai mera!", "Nahi, bharosa hai", "Thoda bohot chalta hai"] },
    { q: "Mujhe tang karogi?", opts: ["24 ghante!", "Nahi, main shareef hoon", "Sirf weekend par"] },
    { q: "Shopping pasand hai?", opts: ["Junoon hai!", "Zaroorat ke mutabiq", "Tum dilwaoge to sab pasand hai"] },
    { q: "Mujhe miss karti ho?", opts: ["Har pal", "Jab baat nahi hoti", "Nahi bolungi (sharam aati hai)"] },
    { q: "Mujhe samajhti ho?", opts: ["Mujhse behtar koi nahi", "Koshish kar rahi hoon", "Haan, bilkul"] },
    { q: "Mere sath future kaisa hai?", opts: ["Bilkul Perfect ✨", "Bohat saari khushiyan", "Dream come true"] },
    { q: "Mujhe priority dogi?", opts: ["Hamesha No. 1", "Dono mil kar manage karenge", "Zaroorat padne par"] },
    { q: "Respect kitni hai?", opts: ["Sabse zyada", "Equal respect hamesha", "Pyaar ke sath sath"] },
    { q: "Family kitni important hai?", opts: ["Top Priority", "Humare liye zaroori hain", "Dono ki families ko khush rakhenge"] },
    { q: "Support karogi?", opts: ["Hamesha sath khadi rahungi", "Har mushkil me", "Aankh band kar ke"] },
    { q: "Mujhe khush rakhogi?", opts: ["Puri koshish rahegi", "Tumhari smile meri khushi", "InshAllah hamesha"] },
    { q: "Forever sath rahogi?", opts: ["Maut tak ❤️", "InshAllah", "No doubt about it!"] }
];

const longQs = [
    "Shaadi ke baad humari life kaisi hogi?", "Tum meri care kaise karogi?", 
    "Agar main naraz ho jaun to kya karogi?", "Tum mujhe kitna importance deti ho?", 
    "Humara dream future kya hoga?", "Tum mujhe kis naam se bulaogi?", 
    "Tum meri sabse achi habit kya samajhti ho?", "Tum meri buri habit kya change karna chahogi?", 
    "Hum fight ko kaise solve karenge?", "Ek line me apni feeling batao ❤️"
];

// Load MCQs
let mcqHtml = "";
examData.forEach((item, i) => {
    mcqHtml += `
    <div class="question-card">
        <span class="q-text">${i+1}. ${item.q}</span>
        <div class="options-grid">
            ${item.opts.map(opt => `
                <label class="option-label">
                    <input type="radio" name="q${i}" value="${opt}">
                    <span>${opt}</span>
                </label>
            `).join('')}
        </div>
    </div>`;
});
document.getElementById("mcqs-container").innerHTML = mcqHtml;

// Load Long Questions
let longHtml = "";
longQs.forEach((q, i) => {
    longHtml += `
    <div class="question-card">
        <span class="q-text">${i+26}. ${q}</span>
        <input type="text" id="s${i+1}" placeholder="Dil se likho...">
    </div>`;
});
document.getElementById("long-questions-container").innerHTML = longHtml;

function submitExam() {
    let resultDiv = document.getElementById("result");
    let resultHTML = "<h2 style='text-align:center'>💖 Result Card 💖</h2>";

    examData.forEach((item, i) => {
        let opts = document.getElementsByName("q"+i);
        let ans = "Nahi bataya 🙈";
        opts.forEach(o => { if(o.checked) ans = o.value; });
        resultHTML += `<p><b>Q${i+1}:</b> ${ans}</p>`;
    });

    resultHTML += "<hr style='border:1px dashed #ff3366'>";

    for(let i=1; i<=10; i++){
        let val = document.getElementById("s"+i).value || "Empty!";
        resultHTML += `<p><b>Q${25+i}:</b> ${val}</p>`;
    }

    resultHTML += "<p style='text-align:center; color:#ff3366; font-weight:bold; font-size:1.2rem'>📸 Ab iska screenshot le kar bhej do!</p>";
    
    resultDiv.innerHTML = resultHTML;
    resultDiv.style.display = "block";
    resultDiv.scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
